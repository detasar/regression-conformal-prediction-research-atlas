experiment_id: regression_fairness_smoke_openml_auto_price_symboling_log1p_v0
purpose: "Policy-gated OpenML Auto Price interval benchmark smoke with symboling insurance-risk diagnostics and log1p target scale. This is a cleaned 159-row numeric subset of the UCI Automobile/Auto Imports family and is not protected-class fairness evidence or validated Venn-Abers regression evidence."
random_seeds: [11, 23, 47, 71, 89]
alphas: [0.10]
target_transform: log1p
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - openml_auto_price
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_openml_auto_price_symboling_log1p/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_openml_auto_price_symboling_log1p/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_openml_auto_price_symboling_log1p/checkpoints/predictions
