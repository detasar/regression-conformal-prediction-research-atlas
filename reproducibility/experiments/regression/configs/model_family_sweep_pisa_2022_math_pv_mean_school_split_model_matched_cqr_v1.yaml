experiment_id: regression_model_family_sweep_pisa_2022_math_pv_mean_school_split_model_matched_cqr_v1
purpose: Model-matched CQR backend rerun cloned from experiments/regression/configs/model_family_sweep_pisa_2022_math_pv_mean_school_split.yaml.
  Historical fixed-GBM CQR rows remain unchanged as comparator evidence; this rerun
  tests whether the CQR backend confounded the original model-family sweep surface.
  The output records backend-sensitivity evidence for this experiment; method
  selection and deployment use require separate validation.
random_seeds:
- 11
- 23
- 47
alphas:
- 0.1
target_transform: identity
splits:
  train: 0.6
  calibration: 0.2
  test: 0.2
  group_col: CNTSCHID
conformal:
  cv_plus_folds: 5
  cv_plus_max_train_rows: 4000
  jackknife_plus_max_train_rows: 250
  jackknife_after_bootstrap_n_resamples: 40
  jackknife_after_bootstrap_sample_fraction: 1.0
  jackknife_after_bootstrap_min_oob: 5
  jackknife_after_bootstrap_max_train_rows: 250
  venn_abers_m: 1
datasets:
- pisa_2022_math_pv_mean
models:
- model_id: ridge
  family: linear
  grid:
    alpha:
    - 0.1
    - 1.0
    - 10.0
    - 100.0
- model_id: elasticnet
  family: sparse_linear
  grid:
    alpha:
    - 0.001
    - 0.01
    - 0.1
    l1_ratio:
    - 0.25
    - 0.75
- model_id: bayesian_ridge
  family: linear_bayesian
  grid:
    alpha_1:
    - 1.0e-06
    alpha_2:
    - 1.0e-06
    lambda_1:
    - 1.0e-06
    lambda_2:
    - 1.0e-06
- model_id: svr
  family: kernel
  grid:
    kernel:
    - rbf
    C:
    - 0.3
    - 1.0
    gamma:
    - scale
    - 0.01
    epsilon:
    - 0.03
    - 0.1
- model_id: kernel_ridge
  family: kernel
  grid:
    kernel:
    - rbf
    alpha:
    - 0.1
    - 1.0
    gamma:
    - 0.001
    - 0.01
- model_id: knn
  family: instance_based
  grid:
    n_neighbors:
    - 5
    - 15
    weights:
    - uniform
    - distance
    p:
    - 2
- model_id: random_forest
  family: tree_ensemble
  grid:
    n_estimators:
    - 120
    max_depth:
    - null
    - 8
    min_samples_leaf:
    - 1
    - 5
    max_features:
    - sqrt
- model_id: extra_trees
  family: tree_ensemble
  grid:
    n_estimators:
    - 120
    max_depth:
    - null
    - 8
    min_samples_leaf:
    - 1
    - 5
    max_features:
    - sqrt
- model_id: hist_gradient_boosting
  family: boosting
  grid:
    learning_rate:
    - 0.03
    - 0.1
    max_leaf_nodes:
    - 15
    - 31
    l2_regularization:
    - 0.0
- model_id: xgboost
  family: boosting
  grid:
    n_estimators:
    - 120
    max_depth:
    - 2
    - 4
    learning_rate:
    - 0.03
    - 0.1
    subsample:
    - 0.8
    colsample_bytree:
    - 0.5
- model_id: lightgbm
  family: boosting
  grid:
    n_estimators:
    - 120
    num_leaves:
    - 15
    - 31
    learning_rate:
    - 0.03
    - 0.1
    subsample:
    - 0.8
    colsample_bytree:
    - 0.5
- model_id: catboost
  family: boosting
  grid:
    iterations:
    - 120
    depth:
    - 2
    - 4
    learning_rate:
    - 0.03
    - 0.1
    l2_leaf_reg:
    - 3.0
cp_methods:
- split_abs
- mondrian_abs
- normalized_abs
- split_tail_0.25
- split_tail_0.50
- split_tail_0.75
- cqr_model_matched
- cv_plus
- cv_minmax
- jackknife_plus
- jackknife_minmax
- jackknife_plus_after_bootstrap
- venn_abers_quantile
- venn_abers_split_fallback
