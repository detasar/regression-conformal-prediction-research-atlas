  checkpoint_root: experiments/regression/results/model_family_sweep_pisa_2022_math_pv_mean_school_split_model_matched_cqr_v1/checkpoints
  prediction_cache_root: experiments/regression/results/model_family_sweep_pisa_2022_math_pv_mean_school_split_model_matched_cqr_v1/checkpoints/predictions
