experiment_id: regression_fairness_smoke_openml_disclosure_x_noise_age_signed_log1p_v0
purpose: "Policy-gated OpenML disclosure_x_noise privacy/disclosure simulation variant smoke with age-bin diagnostics, raw Age dropped from model features, and signed_log1p Income target modeling because the perturbed target includes negative values. This is a variant-family sensitivity benchmark, not independent fairness evidence, income-survey inference, privacy-risk inference, or validated Venn-Abers regression evidence."
random_seeds: [11, 23, 47, 71, 89]
alphas: [0.10]
target_transform: signed_log1p
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - openml_disclosure_x_noise
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_openml_disclosure_x_noise_age_signed_log1p/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_openml_disclosure_x_noise_age_signed_log1p/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_openml_disclosure_x_noise_age_signed_log1p/checkpoints/predictions
