experiment_id: regression_duplicate_cluster_sensitivity_uci_wine_quality_duplicate_sensitivity_row_signature_v0
purpose: "Row-signature duplicate-cluster split sensitivity for the policy-gated UCI Wine Quality raw-vs-exact-deduplicated model-family sweep. This reruns model_family_sweep_uci_wine_quality_duplicate_sensitivity with exact full-row duplicate signatures assigned to a single split before train/cal/test allocation while preserving the raw/dedup dataset pair, official red/white CSV provenance, derived wine_color diagnostics, identity-scale numeric treatment of the bounded ordinal quality target, train-fitted preprocessing, model grid, conformal method grid, fixed-backend CQR boundary, and diagnostic-only Venn-Abers boundary. This is split-methodology sensitivity evidence for the historical full-row duplicate_signature_cross_split_caveat only. It is not protected-class fairness evidence, wine-science inference, product-ranking evidence, bounded-ordinal conformal validity evidence, final model selection, or Venn-Abers regression validation evidence."
random_seeds: [11, 23]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
  duplicate_cluster_scope: row_signature
conformal:
  cv_plus_folds: 5
  cv_plus_max_train_rows: 5000
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - uci_wine_quality
  - uci_wine_quality_dedup
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [0.1, 1.0, 10.0, 100.0]
  - model_id: elasticnet
    family: sparse_linear
    grid:
      alpha: [0.001, 0.01, 0.1]
      l1_ratio: [0.25, 0.75]
  - model_id: bayesian_ridge
    family: linear_bayesian
    grid:
      alpha_1: [0.000001]
      alpha_2: [0.000001]
      lambda_1: [0.000001]
      lambda_2: [0.000001]
  - model_id: svr
    family: kernel
    grid:
      kernel: ["rbf"]
      C: [0.3, 1.0]
      gamma: ["scale", 0.01]
      epsilon: [0.03, 0.1]
  - model_id: kernel_ridge
    family: kernel
    grid:
      kernel: ["rbf"]
      alpha: [0.1, 1.0]
      gamma: [0.001, 0.01]
  - model_id: knn
    family: instance_based
    grid:
      n_neighbors: [5, 15]
      weights: ["uniform", "distance"]
      p: [2]
  - model_id: random_forest
    family: tree_ensemble
    grid:
      n_estimators: [120]
      max_depth: [null, 8]
      min_samples_leaf: [1, 5]
      max_features: ["sqrt"]
  - model_id: extra_trees
    family: tree_ensemble
    grid:
      n_estimators: [120]
      max_depth: [null, 8]
      min_samples_leaf: [1, 5]
      max_features: ["sqrt"]
  - model_id: hist_gradient_boosting
    family: boosting
    grid:
      learning_rate: [0.03, 0.1]
      max_leaf_nodes: [15, 31]
      l2_regularization: [0.0]
  - model_id: xgboost
    family: boosting
    grid:
      n_estimators: [120]
      max_depth: [2, 4]
      learning_rate: [0.03, 0.1]
      subsample: [0.8]
      colsample_bytree: [0.5]
  - model_id: lightgbm
    family: boosting
    grid:
      n_estimators: [120]
      num_leaves: [15, 31]
      learning_rate: [0.03, 0.1]
      subsample: [0.8]
      colsample_bytree: [0.5]
  - model_id: catboost
    family: boosting
    grid:
      iterations: [120]
      depth: [2, 4]
      learning_rate: [0.03, 0.1]
      l2_leaf_reg: [3.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
  - venn_abers_split_fallback
quality_controls:
  require_atomic_checkpoints: true
  require_prediction_bundle_cache: true
  require_dataset_audit: true
  require_model_params_summary_key: true
  interpret_cqr_as_fixed_quantile_backend: true
  interpret_rankings_as_triage_only: true
  note_seed_aggregate_count: 2
  keep_raw_and_dedup_variants_paired: true
  row_signature_duplicate_caveat_followup: true
  duplicate_cluster_scope_is_split_methodology_diagnostic_only: true
  treat_wine_color_as_source_file_diagnostic_only: true
  treat_quality_as_bounded_ordinal_numeric_target: true
  quality_observed_min: 3
  quality_observed_max: 9
  do_not_posthoc_clip_interval_endpoints: true
  track_out_of_quality_range_interval_endpoints: true
  treat_raw_frame_as_duplicate_contaminated_sensitivity: true
  treat_dedup_variant_as_duplicate_sensitivity_variant: true
  forbid_protected_class_fairness_claims: true
  forbid_wine_science_or_product_ranking_claims: true
  forbid_bounded_ordinal_validity_claims: true
  forbid_validated_venn_abers_regression_claims: true
  forbid_final_model_selection_claims: true
logging:
  ledger: experiments/regression/results/duplicate_cluster_sensitivity_uci_wine_quality_duplicate_sensitivity_row_signature/ledger.jsonl
  checkpoint_root: experiments/regression/results/duplicate_cluster_sensitivity_uci_wine_quality_duplicate_sensitivity_row_signature/checkpoints
  prediction_cache_root: experiments/regression/results/duplicate_cluster_sensitivity_uci_wine_quality_duplicate_sensitivity_row_signature/checkpoints/predictions
