experiment_id: regression_fairness_smoke_hmda_2025_wy_interest_rate_v0
purpose: "Smoke-test audited HMDA 2025 Wyoming originated-loan interest-rate regression with derived-race conformal diagnostics and a county-grouped split. This is a single-state engineering smoke, not a fair-lending conclusion."
random_seeds: [42]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
  group_col: county_code
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - hmda_2025_wy_interest_rate
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_hmda_interest_rate/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_hmda_interest_rate/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_hmda_interest_rate/checkpoints/predictions
