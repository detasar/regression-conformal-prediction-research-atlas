experiment_id: regression_fairness_smoke_openml_arsenic_event_rate_panel_sex_log1p_exposure_drop_v0
purpose: "Policy-gated OpenML arsenic aggregate event-rate smoke combining female/male bladder/lung variants, deriving event_rate_per_100k from events/at.risk, using sex diagnostics, dropping raw count/exposure/source-id columns, and applying log1p target modeling. This is aggregate epidemiology benchmark interval evidence only, not individual fairness evidence, clinical/epidemiological inference, exposure-adjusted count-model validation, or validated Venn-Abers regression evidence."
random_seeds: [11, 23, 47, 71, 89]
alphas: [0.10]
target_transform: log1p
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - openml_arsenic_event_rate_panel
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_openml_arsenic_event_rate_panel_sex_log1p_exposure_drop/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_openml_arsenic_event_rate_panel_sex_log1p_exposure_drop/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_openml_arsenic_event_rate_panel_sex_log1p_exposure_drop/checkpoints/predictions
