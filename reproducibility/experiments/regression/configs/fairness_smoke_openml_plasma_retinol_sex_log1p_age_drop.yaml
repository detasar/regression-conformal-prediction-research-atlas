experiment_id: regression_fairness_smoke_openml_plasma_retinol_sex_log1p_age_drop_v0
purpose: "Policy-gated OpenML plasma_retinol biomarker benchmark smoke with SEX diagnostics, AGE binned for audit then dropped from model features, BETAPLASMA co-analyte dropped, and log1p target modeling. This is not clinical inference, population health evidence, cancer-risk evidence, sex/gender fairness evidence, or validated Venn-Abers regression evidence."
random_seeds: [11, 23, 47, 71, 89]
alphas: [0.10]
target_transform: log1p
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - openml_plasma_retinol
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_openml_plasma_retinol_sex_log1p_age_drop/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_openml_plasma_retinol_sex_log1p_age_drop/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_openml_plasma_retinol_sex_log1p_age_drop/checkpoints/predictions
