  checkpoint_root: experiments/regression/results/model_family_sweep_meps_2023_total_expenditure_log1p_varstr_split_model_matched_cqr_v1/checkpoints
  prediction_cache_root: experiments/regression/results/model_family_sweep_meps_2023_total_expenditure_log1p_varstr_split_model_matched_cqr_v1/checkpoints/predictions
