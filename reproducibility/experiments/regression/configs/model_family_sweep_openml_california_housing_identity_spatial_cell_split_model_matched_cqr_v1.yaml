experiment_id: regression_model_family_sweep_openml_california_housing_identity_spatial_cell_split_model_matched_cqr_v1
purpose: Model-matched CQR backend rerun cloned from experiments/regression/configs/model_family_sweep_openml_california_housing_identity_spatial_cell_split.yaml.
  Historical fixed-GBM CQR rows remain unchanged as comparator evidence; this rerun
  tests whether the CQR backend confounded the original model-family sweep surface.
  The output records backend-sensitivity evidence for this experiment; method
  selection and deployment use would need separate validation studies.
random_seeds:
- 11
- 23
- 47
alphas:
- 0.1
target_transform: identity
splits:
  train: 0.6
  calibration: 0.2
  test: 0.2
  group_col: spatial_cell
conformal:
  cv_plus_folds: 5
  cv_plus_max_train_rows: 15000
  jackknife_plus_max_train_rows: 250
  jackknife_after_bootstrap_n_resamples: 40
  jackknife_after_bootstrap_sample_fraction: 1.0
  jackknife_after_bootstrap_min_oob: 5
  jackknife_after_bootstrap_max_train_rows: 250
  venn_abers_m: 1
datasets:
- openml_california_housing_spatial_cell
models:
- model_id: ridge
  family: linear
  grid:
    alpha:
    - 0.1
    - 1.0
    - 10.0
    - 100.0
    - 1000.0
- model_id: elasticnet
  family: sparse_linear
  grid:
    alpha:
    - 0.001
    - 0.01
    - 0.1
    l1_ratio:
    - 0.25
    - 0.75
- model_id: bayesian_ridge
  family: linear_bayesian
  grid:
    alpha_1:
    - 1.0e-06
    alpha_2:
    - 1.0e-06
    lambda_1:
    - 1.0e-06
    lambda_2:
    - 1.0e-06
- model_id: knn
  family: instance_based
  grid:
    n_neighbors:
    - 15
    - 50
    weights:
    - uniform
    - distance
    p:
    - 2
- model_id: random_forest
  family: tree_ensemble
  grid:
    n_estimators:
    - 120
    max_depth:
    - 8
    - 16
    min_samples_leaf:
    - 5
    - 20
    max_features:
    - sqrt
- model_id: extra_trees
  family: tree_ensemble
  grid:
    n_estimators:
    - 120
    max_depth:
    - 8
    - 16
    min_samples_leaf:
    - 5
    - 20
    max_features:
    - sqrt
- model_id: hist_gradient_boosting
  family: boosting
  grid:
    learning_rate:
    - 0.03
    - 0.1
    max_leaf_nodes:
    - 15
    - 31
    l2_regularization:
    - 0.0
    - 1.0
- model_id: xgboost
  family: boosting
  grid:
    n_estimators:
    - 120
    max_depth:
    - 2
    - 4
    learning_rate:
    - 0.03
    - 0.1
    subsample:
    - 0.8
    colsample_bytree:
    - 0.5
    - 1.0
- model_id: lightgbm
  family: boosting
  grid:
    n_estimators:
    - 120
    num_leaves:
    - 15
    - 31
    learning_rate:
    - 0.03
    - 0.1
    subsample:
    - 0.8
    colsample_bytree:
    - 0.5
    - 1.0
- model_id: catboost
  family: boosting
  grid:
    iterations:
    - 120
    depth:
    - 2
    - 4
    learning_rate:
    - 0.03
    - 0.1
    l2_leaf_reg:
    - 3.0
cp_methods:
- split_abs
- mondrian_abs
- normalized_abs
- split_tail_0.25
- split_tail_0.50
- split_tail_0.75
- cqr_model_matched
- cv_plus
- cv_minmax
- jackknife_plus
- jackknife_minmax
- jackknife_plus_after_bootstrap
- venn_abers_quantile
- venn_abers_split_fallback
quality_controls:
  require_atomic_checkpoints: true
  require_prediction_bundle_cache: true
  require_dataset_audit: true
  require_model_params_summary_key: true
  interpret_rankings_as_triage_only: true
  note_seed_aggregate_count: 3
  include_tail_specific_split_variants_for_raw_scale_endpoint_stress: true
  include_cv_plus_and_cv_minmax_when_train_cap_permits: true
  include_jackknife_family_with_runtime_caps: true
  treat_identity_target_as_first_pass_only: true
  primary_group_ocean_proximity_geographic_proxy_diagnostic_only: true
  split_group_spatial_cell_holdout: true
  not_iid_row_split_evidence: true
  document_openml_43939_public_source: true
  document_target_cap_500001: true
  document_sparse_island_group: true
  document_total_bedrooms_train_fitted_imputation: true
  document_raw_latitude_longitude_remain_model_visible: true
  document_target_cap_sensitivity_not_integrated: true
  document_broader_spatial_temporal_sensitivity_not_integrated: true
  document_kernel_methods_deferred_for_spatial_full_frame_subsample_sensitivity: true
  cv_plus_runtime_bounded_not_full_data_guarantee: true
  jackknife_runtime_bounded_not_full_data_guarantee: true
  geographic_proxy_diagnostics_only: true
  forbid_protected_class_group_inference_claims: true
  forbid_demographic_parity_claims: true
  forbid_race_sex_age_group_inference_claims: true
  forbid_housing_market_estimate_claims: true
  forbid_appraisal_or_pricing_guidance_claims: true
  forbid_policy_guidance_claims: true
  forbid_causal_claims: true
  forbid_population_inferential_claims: true
  forbid_production_claims: true
  forbid_final_model_selection_claims: true
  forbid_target_cap_robustness_claims_without_sensitivity: true
  forbid_bounded_interval_validity_claims_without_endpoint_policy: true
  forbid_validated_venn_abers_regression_claims: true
  interpret_cqr_as_model_matched_quantile_backend: true
  historical_fixed_gbm_cqr_preserved_as_comparator: true
  requires_cqr_fixed_vs_model_matched_synthesis: true
  no_method_selection_claim: true
logging:
  ledger: experiments/regression/results/model_family_sweep_openml_california_housing_identity_spatial_cell_split_model_matched_cqr_v1/ledger.jsonl
  checkpoint_root: experiments/regression/results/model_family_sweep_openml_california_housing_identity_spatial_cell_split_model_matched_cqr_v1/checkpoints
  prediction_cache_root: experiments/regression/results/model_family_sweep_openml_california_housing_identity_spatial_cell_split_model_matched_cqr_v1/checkpoints/predictions
cp_method_configs:
  cqr_model_matched:
    method_id: cqr_model_matched
    params:
      quantile_regressor_alpha: 0.0001
      quantile_solver: highs
      nystroem_components: 200
