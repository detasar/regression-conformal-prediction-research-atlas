experiment_id: regression_fairness_smoke_openml_gascons_income_ordered_v0
purpose: "Policy-gated OpenML gascons tiny economic time-series smoke with year-ordered train/calibration/test splits and income-bin diagnostics. This is not protected-class fairness evidence, energy-demand inference, policy forecasting, or validated Venn-Abers regression evidence."
random_seeds: [11]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.50
  calibration: 0.25
  test: 0.25
  strategy: ordered
  order_col: year
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - openml_gascons_consumption
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_openml_gascons_income_ordered/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_openml_gascons_income_ordered/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_openml_gascons_income_ordered/checkpoints/predictions
