experiment_id: regression_fairness_smoke_folktables_acs_poverty_ratio_wy_v0
purpose: "Three-seed unweighted engineering smoke for audited Folktables ACS 2018 1-Year Wyoming continuous income-to-poverty ratio regression with RAC1P group diagnostics. This disables the predefined binary ACSIncomePovertyRatio target transform and remains survey-weight, top-code, state-panel, sparse-group, and target-universe policy gated."
random_seeds: [11, 23, 47]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - folktables_acs_poverty_ratio_wy
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_folktables_acs_poverty_ratio_wy/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_folktables_acs_poverty_ratio_wy/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_folktables_acs_poverty_ratio_wy/checkpoints/predictions
