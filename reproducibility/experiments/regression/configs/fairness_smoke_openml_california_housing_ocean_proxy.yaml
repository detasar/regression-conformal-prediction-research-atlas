experiment_id: regression_fairness_smoke_openml_california_housing_ocean_proxy_v0
purpose: "Three-seed OpenML California Housing iid interval benchmark with ocean_proximity proxy diagnostics. This uses median_house_value on the original dollar scale, treats ocean_proximity as a geographic/coastal proxy group rather than a protected attribute, and is not spatial-generalization or protected-class fairness evidence."
random_seeds: [11, 23, 47]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - openml_california_housing
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_openml_california_housing_ocean_proxy/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_openml_california_housing_ocean_proxy/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_openml_california_housing_ocean_proxy/checkpoints/predictions
