experiment_id: regression_fairness_smoke_openml_baseball_team_salary_league_log1p_team_drop_v0
purpose: "Policy-gated OpenML baseball-team average salary aggregate benchmark smoke with 1987 average salary target, league diagnostics, team identity dropped when present, and log1p target modeling for sports-salary family consistency. The frame has only 26 aggregate team rows, so this is sports-salary interval benchmark evidence only, not protected-class fairness evidence, labor-market inference, team valuation, team ranking, or validated Venn-Abers regression evidence."
random_seeds: [11, 23, 47, 71, 89]
alphas: [0.10]
target_transform: log1p
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - openml_baseball_team_salary
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_openml_baseball_team_salary_league_log1p_team_drop/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_openml_baseball_team_salary_league_log1p_team_drop/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_openml_baseball_team_salary_league_log1p_team_drop/checkpoints/predictions
