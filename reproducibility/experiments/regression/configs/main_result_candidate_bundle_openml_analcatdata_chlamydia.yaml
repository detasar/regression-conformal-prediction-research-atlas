experiment_id: regression_main_result_candidate_bundle_openml_analcatdata_chlamydia_v1
purpose: Fresh-seed main-result candidate bundle for openml_analcatdata_chlamydia.
  This config reuses the audited post-selection validation preprocessing/split/model
  scaffold, carries CQR only as a diagnostic primary candidate, retains challenger
  methods for multiplicity, and forbids any final main-result claim until the candidate
  batch is executed and all paper gates pass.
random_seeds: &id001
- 401
- 503
- 701
alphas:
- 0.01
- 0.05
- 0.1
- 0.15
- 0.2
target_transform: log1p
splits:
  train: 0.6
  calibration: 0.2
  test: 0.2
  duplicate_cluster_scope: model_visible_features_plus_target
conformal:
  cv_plus_folds: 5
  cv_plus_max_train_rows: 500
  jackknife_plus_max_train_rows: 500
  jackknife_after_bootstrap_n_resamples: 40
  jackknife_after_bootstrap_sample_fraction: 1.0
  jackknife_after_bootstrap_min_oob: 5
  jackknife_after_bootstrap_max_train_rows: 500
  venn_abers_m: 1
datasets:
- openml_analcatdata_chlamydia
models:
- model_id: ridge
  family: linear
  grid:
    alpha:
    - 0.1
cp_methods:
- cqr
- cv_plus
- mondrian_abs
quality_controls:
  require_atomic_checkpoints: true
  require_prediction_bundle_cache: true
  require_dataset_audit: true
  require_model_params_summary_key: true
  interpret_cqr_as_fixed_quantile_backend: true
  interpret_rankings_as_triage_only: true
  duplicate_cluster_scope_is_split_methodology_diagnostic_only: true
  note_seed_aggregate_count: 2
  focused_on_model_visible_duplicate_caveat_seeds: true
  include_tail_specific_split_variants_for_right_skewed_count_target: true
  include_plus_minmax_and_jackknife_after_bootstrap_for_tiny_n: true
  treat_log1p_as_first_pass_transform_only: true
  require_raw_log_target_sensitivity_followup: true
  gender_primary_group_diagnostic: true
  retain_age_race_secondary_audit_context: true
  aggregate_stratum_rows_not_individuals: true
  no_exposure_denominator_or_rate_model: true
  forbid_public_health_claims: true
  forbid_population_disease_burden_claims: true
  forbid_sex_race_age_fairness_claims: true
  forbid_causal_claims: true
  forbid_final_model_selection_claims: true
  forbid_validated_venn_abers_regression_claims: true
  method_selection_alpha_expansion_batch: true
  support_expansion_only_no_final_selection: true
  no_final_method_selection_claim: true
  candidate_methods_restricted_to_current_shortlist: true
  target_alphas_from_alpha_expansion_plan: true
  representative_source_model_only: true
  full_model_family_sweep_not_rerun: true
  requires_post_batch_resynthesis_and_reaudit: true
  method_selection_post_selection_validation_batch: true
  post_selection_validation_only_no_final_selection: true
  validation_seeds_independent_from_selection_surface: true
  fixed_common_alpha_grid_for_validation: true
  requires_post_validation_resynthesis_and_reaudit: true
  forbid_fairness_population_claims_without_population_gate: true
  forbid_bounded_support_claims_without_endpoint_gate: true
  main_result_candidate_bundle_batch: true
  candidate_main_result_work_queue_only: true
  no_main_result_promotion: true
  diagnostic_primary_method_carried_forward: cqr
  challenger_methods_retained_for_multiplicity: true
  main_result_candidate_seeds_independent_from_selection_and_validation: true
  fixed_common_alpha_grid_for_main_result_candidate: true
  requires_completed_candidate_runs_before_manifest_promotion: true
  requires_dataset_specific_final_gate_before_claim: true
  requires_endpoint_bounded_support_gate_before_claim: true
  requires_fairness_population_gate_before_claim: true
  requires_validated_venn_abers_gate_before_claim: true
  forbid_final_method_selection_claims: true
  forbid_main_result_claims_until_all_paper_gates_pass: true
main_result_candidate_provenance:
  schema: cpfi_regression_main_result_candidate_bundle_plan_v1
  batch_id: main_result_candidate_bundle_v1
  source_validation_kind: standard_post_selection_validation
  source_validation_config: experiments/regression/configs/method_selection_post_selection_validation_openml_analcatdata_chlamydia.yaml
  source_validation_experiment_id: regression_method_selection_post_selection_validation_openml_analcatdata_chlamydia_v1
  source_validation_ledger: experiments/regression/results/method_selection_post_selection_validation_openml_analcatdata_chlamydia/ledger.jsonl
  source_validation_pilot_summary: experiments/regression/reports/method_selection_post_selection_validation_openml_analcatdata_chlamydia/pilot_summary.json
  source_selection_and_validation_seeds:
  - 101
  - 211
  - 307
  - 42
  - 71
  main_result_candidate_seeds: *id001
  seed_overlap: []
  primary_candidate_method: cqr
  claim_boundary: candidate_work_queue_only_no_main_result_promotion
logging:
  ledger: experiments/regression/results/main_result_candidate_bundle_openml_analcatdata_chlamydia/ledger.jsonl
  checkpoint_root: experiments/regression/results/main_result_candidate_bundle_openml_analcatdata_chlamydia/checkpoints
  prediction_cache_root: experiments/regression/results/main_result_candidate_bundle_openml_analcatdata_chlamydia/checkpoints/predictions
