experiment_id: regression_fairness_smoke_diabetes_los_v0
purpose: "Smoke-test Fairlearn/UCI Diabetes 130-Hospitals length-of-stay regression with race-group conformal diagnostics. Clinical leakage policy is smoke-only, not headline evidence."
random_seeds: [42]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - fairlearn_diabetes_hospital_los
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - venn_abers_quantile
quality_controls:
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_diabetes_los/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_diabetes_los/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_diabetes_los/checkpoints/predictions
