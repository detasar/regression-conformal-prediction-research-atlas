experiment_id: regression_fairness_smoke_uci_communities_crime_ecological_v0
purpose: "Three-seed ecological/proxy benchmark smoke for UCI Communities and Crime. Uses ViolentCrimesPerPop as a normalized aggregate community target and racepctblack quartile diagnostics. This drops identifiers, the raw racepctblack grouping source, and high-missing LEMAS/police columns; it is not individual protected-class fairness evidence."
random_seeds: [11, 23, 47]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - uci_communities_crime
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_uci_communities_crime_ecological/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_uci_communities_crime_ecological/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_uci_communities_crime_ecological/checkpoints/predictions
