experiment_id: regression_fairness_smoke_openml_fishcatch_weight_species_log1p_sex_drop_v0
purpose: "Policy-gated OpenML Fish Catch weight smoke with Species diagnostics, log1p target scale, and Sex dropped because it is 55.1% missing. The target column is named class in OpenML but represents fish weight in grams. This is a morphometric interval benchmark, not protected-class fairness evidence or validated Venn-Abers regression evidence."
random_seeds: [11, 23, 47, 71, 89]
alphas: [0.10]
target_transform: log1p
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - openml_fishcatch_weight
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_openml_fishcatch_weight_species_log1p_sex_drop/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_openml_fishcatch_weight_species_log1p_sex_drop/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_openml_fishcatch_weight_species_log1p_sex_drop/checkpoints/predictions
