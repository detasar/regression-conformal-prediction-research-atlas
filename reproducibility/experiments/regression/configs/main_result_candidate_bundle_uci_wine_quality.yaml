experiment_id: regression_main_result_candidate_bundle_uci_wine_quality_v1
purpose: Fresh-seed main-result candidate bundle for uci_wine_quality. This config
  reuses the audited post-selection validation preprocessing/split/model scaffold,
  carries CQR only as a diagnostic primary candidate, retains challenger methods for
  multiplicity, and forbids any final main-result claim until the candidate batch
  is executed and all paper gates pass.
random_seeds: &id001
- 401
- 503
- 701
alphas:
- 0.01
- 0.05
- 0.1
- 0.15
- 0.2
target_transform: identity
splits:
  train: 0.6
  calibration: 0.2
  test: 0.2
conformal:
  cv_plus_folds: 5
  cv_plus_max_train_rows: 5000
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
- uci_wine_quality
models:
- model_id: ridge
  family: linear
  grid:
    alpha:
    - 0.1
cp_methods:
- cqr
- cv_plus
- mondrian_abs
quality_controls:
  require_atomic_checkpoints: true
  require_prediction_bundle_cache: true
  require_dataset_audit: true
  require_model_params_summary_key: true
  interpret_cqr_as_fixed_quantile_backend: true
  interpret_rankings_as_triage_only: true
  note_seed_aggregate_count: 2
  keep_raw_and_dedup_variants_paired: true
  treat_wine_color_as_source_file_diagnostic_only: true
  treat_quality_as_bounded_ordinal_numeric_target: true
  quality_observed_min: 3
  quality_observed_max: 9
  do_not_posthoc_clip_interval_endpoints: true
  track_out_of_quality_range_interval_endpoints: true
  treat_raw_frame_as_duplicate_contaminated_sensitivity: true
  treat_dedup_variant_as_duplicate_sensitivity_variant: true
  forbid_protected_class_fairness_claims: true
  forbid_wine_science_or_product_ranking_claims: true
  forbid_bounded_ordinal_validity_claims: true
  forbid_validated_venn_abers_regression_claims: true
  forbid_final_model_selection_claims: true
  dataset_final_gate_post_selection_validation_bridge: true
  post_selection_validation_only_no_final_selection: true
  uci_wine_quality_source_model_family_sweep_bridge: true
  bridge_dataset_was_not_in_alpha_expansion_batch: true
  raw_uci_wine_variant_only: true
  dedup_variant_not_rerun_in_bridge: true
  candidate_methods_restricted_to_current_shortlist: true
  validation_seeds_independent_from_source_sweep: true
  fixed_common_alpha_grid_for_validation: true
  representative_source_model_only: true
  full_model_family_sweep_not_rerun: true
  requires_bridge_execution_and_post_run_audit: true
  no_final_method_selection_claim: true
  forbid_fairness_population_claims_without_population_gate: true
  forbid_bounded_support_claims_without_endpoint_gate: true
  main_result_candidate_bundle_batch: true
  candidate_main_result_work_queue_only: true
  no_main_result_promotion: true
  diagnostic_primary_method_carried_forward: cqr
  challenger_methods_retained_for_multiplicity: true
  main_result_candidate_seeds_independent_from_selection_and_validation: true
  fixed_common_alpha_grid_for_main_result_candidate: true
  requires_completed_candidate_runs_before_manifest_promotion: true
  requires_dataset_specific_final_gate_before_claim: true
  requires_endpoint_bounded_support_gate_before_claim: true
  requires_fairness_population_gate_before_claim: true
  requires_validated_venn_abers_gate_before_claim: true
  forbid_final_method_selection_claims: true
  forbid_main_result_claims_until_all_paper_gates_pass: true
main_result_candidate_provenance:
  schema: cpfi_regression_main_result_candidate_bundle_plan_v1
  batch_id: main_result_candidate_bundle_v1
  source_validation_kind: dataset_final_gate_bridge_post_selection_validation
  source_validation_config: experiments/regression/configs/method_selection_post_selection_validation_bridge_uci_wine_quality.yaml
  source_validation_experiment_id: regression_dataset_final_gate_post_selection_validation_bridge_uci_wine_quality_v1
  source_validation_ledger: experiments/regression/results/method_selection_post_selection_validation_uci_wine_quality/ledger.jsonl
  source_validation_pilot_summary: experiments/regression/reports/method_selection_post_selection_validation_uci_wine_quality/pilot_summary.json
  source_selection_and_validation_seeds:
  - 101
  - 211
  - 307
  main_result_candidate_seeds: *id001
  seed_overlap: []
  primary_candidate_method: cqr
  claim_boundary: candidate_work_queue_only_no_main_result_promotion
logging:
  ledger: experiments/regression/results/main_result_candidate_bundle_uci_wine_quality/ledger.jsonl
  checkpoint_root: experiments/regression/results/main_result_candidate_bundle_uci_wine_quality/checkpoints
  prediction_cache_root: experiments/regression/results/main_result_candidate_bundle_uci_wine_quality/checkpoints/predictions
