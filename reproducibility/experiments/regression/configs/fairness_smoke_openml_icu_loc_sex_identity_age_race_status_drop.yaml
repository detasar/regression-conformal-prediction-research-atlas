experiment_id: regression_fairness_smoke_openml_icu_loc_sex_identity_age_race_status_drop_v0
purpose: "Policy-gated OpenML DASL ICU ordinal clinical benchmark smoke with LOC as level-of-consciousness target, SEX diagnostics, age-bin audit context, vital-status/outcome STA drop, AGE and RAC sensitive-proxy drops, and identity target modeling. The source was originally a survival-to-discharge logistic-regression example, so this smoke is clinical interval machinery diagnostics only, not clinical decision support, mortality modeling, ICU triage guidance, length-of-stay evidence, or validated Venn-Abers regression evidence."
random_seeds: [11, 23, 47, 71, 89]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - openml_icu_loc
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_openml_icu_loc_sex_identity_age_race_status_drop/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_openml_icu_loc_sex_identity_age_race_status_drop/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_openml_icu_loc_sex_identity_age_race_status_drop/checkpoints/predictions
