experiment_id: regression_duplicate_cluster_sensitivity_openml_delta_elevators_se_climbrate_identity_proxy_drop_model_visible_v0
purpose: "Model-visible feature-plus-target duplicate-cluster split sensitivity for the policy-gated OpenML delta_elevators tabular control benchmark. This follows the row-signature duplicate-cluster sensitivity report, which cleared exact full-row duplicate signatures but still carried model-visible feature-plus-target duplicate signatures across train/cal/test splits. The run preserves the same seeds, model grid, conformal method grid, climbRate_bin diagnostic/proxy grouping, raw climbRate feature drop, identity target modeling, resumable ledger, and diagnostic-only Venn-Abers boundary, but assigns duplicate clusters using model-visible fitted features plus target before train/cal/test allocation. The paired comparison is split-methodology sensitivity evidence only. It is not protected-class fairness evidence, aircraft-control guidance, safety validation, physical-system validation, production evidence, final model selection, bounded-support evidence, or validated Venn-Abers regression evidence. CQR rows remain fixed GradientBoostingRegressor quantile-backend evidence rather than outer model-family-sensitive CQR evidence."
random_seeds: [11, 23]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
  duplicate_cluster_scope: model_visible_features_plus_target
conformal:
  cv_plus_folds: 5
  cv_plus_max_train_rows: 6000
  jackknife_plus_max_train_rows: 250
  venn_abers_m: 1
datasets:
  - openml_delta_elevators_se
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [0.1, 1.0, 10.0, 100.0]
  - model_id: elasticnet
    family: sparse_linear
    grid:
      alpha: [0.001, 0.01, 0.1]
      l1_ratio: [0.25, 0.75]
  - model_id: bayesian_ridge
    family: linear_bayesian
    grid:
      alpha_1: [0.000001]
      alpha_2: [0.000001]
      lambda_1: [0.000001]
      lambda_2: [0.000001]
  - model_id: svr
    family: kernel
    grid:
      kernel: ["rbf"]
      C: [0.3, 1.0]
      gamma: ["scale", 0.01]
      epsilon: [0.03, 0.1]
  - model_id: kernel_ridge
    family: kernel
    grid:
      kernel: ["rbf"]
      alpha: [0.1, 1.0]
      gamma: [0.001, 0.01]
  - model_id: knn
    family: instance_based
    grid:
      n_neighbors: [5, 15]
      weights: ["uniform", "distance"]
      p: [2]
  - model_id: random_forest
    family: tree_ensemble
    grid:
      n_estimators: [120]
      max_depth: [null, 8]
      min_samples_leaf: [1, 5]
      max_features: ["sqrt"]
  - model_id: extra_trees
    family: tree_ensemble
    grid:
      n_estimators: [120]
      max_depth: [null, 8]
      min_samples_leaf: [1, 5]
      max_features: ["sqrt"]
  - model_id: hist_gradient_boosting
    family: boosting
    grid:
      learning_rate: [0.03, 0.1]
      max_leaf_nodes: [15, 31]
      l2_regularization: [0.0]
  - model_id: xgboost
    family: boosting
    grid:
      n_estimators: [120]
      max_depth: [2, 4]
      learning_rate: [0.03, 0.1]
      subsample: [0.8]
      colsample_bytree: [0.5]
  - model_id: lightgbm
    family: boosting
    grid:
      n_estimators: [120]
      num_leaves: [15, 31]
      learning_rate: [0.03, 0.1]
      subsample: [0.8]
      colsample_bytree: [0.5]
  - model_id: catboost
    family: boosting
    grid:
      iterations: [120]
      depth: [2, 4]
      learning_rate: [0.03, 0.1]
      l2_leaf_reg: [3.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
  - venn_abers_split_fallback
quality_controls:
  require_atomic_checkpoints: true
  require_prediction_bundle_cache: true
  require_dataset_audit: true
  require_model_params_summary_key: true
  interpret_cqr_as_fixed_quantile_backend: true
  interpret_rankings_as_triage_only: true
  note_seed_aggregate_count: 2
  treat_climbRate_bin_as_diagnostic_only: true
  interpret_duplicate_cluster_scope_as_sensitivity_only: true
  model_visible_duplicate_caveat_followup: true
  forbid_protected_class_fairness_claims: true
  forbid_aircraft_control_guidance_claims: true
  forbid_safety_validation_claims: true
  forbid_physical_system_validation_claims: true
  forbid_production_claims: true
  forbid_final_model_selection_claims: true
  forbid_bounded_support_claims: true
  forbid_validated_venn_abers_regression_claims: true
logging:
  ledger: experiments/regression/results/duplicate_cluster_sensitivity_openml_delta_elevators_se_climbrate_identity_proxy_drop_model_visible/ledger.jsonl
  checkpoint_root: experiments/regression/results/duplicate_cluster_sensitivity_openml_delta_elevators_se_climbrate_identity_proxy_drop_model_visible/checkpoints
  prediction_cache_root: experiments/regression/results/duplicate_cluster_sensitivity_openml_delta_elevators_se_climbrate_identity_proxy_drop_model_visible/checkpoints/predictions
