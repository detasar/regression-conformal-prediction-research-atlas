  no_method_selection_claim: true
logging:
  ledger: experiments/regression/results/model_family_sweep_nhanes_2017_2018_bmi_identity_ridreth3_model_matched_cqr_v1/ledger.jsonl
  checkpoint_root: experiments/regression/results/model_family_sweep_nhanes_2017_2018_bmi_identity_ridreth3_model_matched_cqr_v1/checkpoints
  prediction_cache_root: experiments/regression/results/model_family_sweep_nhanes_2017_2018_bmi_identity_ridreth3_model_matched_cqr_v1/checkpoints/predictions
