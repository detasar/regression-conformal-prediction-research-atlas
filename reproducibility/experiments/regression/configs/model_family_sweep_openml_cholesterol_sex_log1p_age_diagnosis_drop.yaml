experiment_id: regression_model_family_sweep_openml_cholesterol_sex_log1p_age_diagnosis_drop_v0
purpose: "Controlled model-family and hyperparameter sweep for the policy-gated OpenML cholesterol benchmark. This extends the ridge smoke to linear, kernel, instance-based, tree-ensemble, and boosting regressors while preserving the same sex diagnostics, age-bin audit/drop policy, diagnosis/status drop, log1p target modeling, resumable ledger, and Venn-Abers diagnostic-only boundary. This is not clinical inference, medical decision support evidence, population health evidence, sex/gender fairness evidence, or validated Venn-Abers regression evidence."
random_seeds: [11, 23]
alphas: [0.10]
target_transform: log1p
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  cv_plus_max_train_rows: 250
  jackknife_plus_max_train_rows: 250
  venn_abers_m: 1
datasets:
  - openml_cholesterol_chol
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [0.1, 1.0, 10.0]
  - model_id: elasticnet
    family: linear
    grid:
      alpha: [0.01, 0.1]
      l1_ratio: [0.25, 0.75]
  - model_id: bayesian_ridge
    family: linear_bayesian
    grid:
      alpha_1: [0.000001]
      alpha_2: [0.000001]
      lambda_1: [0.000001]
      lambda_2: [0.000001]
  - model_id: svr
    family: kernel
    grid:
      kernel: ["rbf"]
      C: [0.3, 1.0]
      gamma: ["scale", 0.1]
      epsilon: [0.1]
  - model_id: kernel_ridge
    family: kernel
    grid:
      kernel: ["rbf"]
      alpha: [0.1, 1.0]
      gamma: [0.01, 0.1]
  - model_id: knn
    family: instance_based
    grid:
      n_neighbors: [5, 15]
      weights: ["uniform", "distance"]
      p: [2]
  - model_id: random_forest
    family: tree_ensemble
    grid:
      n_estimators: [80]
      max_depth: [null, 8]
      min_samples_leaf: [1, 5]
      max_features: ["sqrt"]
  - model_id: extra_trees
    family: tree_ensemble
    grid:
      n_estimators: [80]
      max_depth: [null, 8]
      min_samples_leaf: [1, 5]
      max_features: ["sqrt"]
  - model_id: hist_gradient_boosting
    family: boosting
    grid:
      learning_rate: [0.03, 0.1]
      max_leaf_nodes: [15, 31]
      l2_regularization: [0.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  require_atomic_checkpoints: true
  require_prediction_bundle_cache: true
  require_dataset_audit: true
  require_model_params_summary_key: true
  interpret_cqr_as_fixed_quantile_backend: true
  interpret_rankings_as_triage_only: true
  forbid_validated_venn_abers_regression_claims: true
logging:
  ledger: experiments/regression/results/model_family_sweep_openml_cholesterol_sex_log1p_age_diagnosis_drop/ledger.jsonl
  checkpoint_root: experiments/regression/results/model_family_sweep_openml_cholesterol_sex_log1p_age_diagnosis_drop/checkpoints
  prediction_cache_root: experiments/regression/results/model_family_sweep_openml_cholesterol_sex_log1p_age_diagnosis_drop/checkpoints/predictions
