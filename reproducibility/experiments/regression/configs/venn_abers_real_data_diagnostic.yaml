experiment_id: regression_venn_abers_real_data_diagnostic_v0
purpose: "Score Venn-Abers regression diagnostics on audited real datasets without mixing predictive-distribution metrics into interval ledgers."
random_seeds: [42]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  venn_abers_m: 1
  ivapd_grid_size: 41
  ivapd_max_test_rows: 25
  venn_abers_grid_size: 31
  venn_abers_grid_max_test_rows: 8
  venn_abers_m_sensitivity: [1, 2, 4, 8, 16]
  venn_abers_bridge_inflation_factors: [1.0, 1.5, 2.0, 2.5, 3.0]
datasets:
  - uci_student_performance
  - uci_auto_mpg
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
  - model_id: hist_gradient_boosting
    family: boosting
    grid:
      learning_rate: [0.06]
      max_leaf_nodes: [31]
      l2_regularization: [0.1]
methods_under_diagnostic:
  interval_method: venn_abers_quantile
  distribution_method: ivapd_threshold_grid
  reference_method: venn_abers_quantile_grid
baseline_interval_methods:
  - split_abs
  - venn_abers_split_fallback
  - mondrian_abs
  - normalized_abs
  - cqr
logging:
  ledger: experiments/regression/results/venn_abers_real_data_diagnostic/ledger.jsonl
  checkpoint_root: experiments/regression/results/venn_abers_real_data_diagnostic/checkpoints
  prediction_cache_root: experiments/regression/results/venn_abers_real_data_diagnostic/checkpoints/predictions
  report_dir: experiments/regression/reports/venn_abers_real_data_diagnostic
