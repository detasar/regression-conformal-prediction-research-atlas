experiment_id: regression_model_family_sweep_scf_2022_networth_signed_log1p_family_split_v0
purpose: "Controlled large-survey model-family and conformal-variant sweep for the policy-gated Federal Reserve SCF 2022 family net-worth benchmark. This extends the completed ridge signed_log1p smoke to regularized linear, Bayesian linear, instance-based, tree-ensemble, histogram boosting, and installed gradient-boosting libraries while preserving RACECL as the primary family/household race-class diagnostic group, YY1 family-grouped splitting, signed_log1p target modeling for NETWORTH, train-fitted preprocessing, resumable ledger, prediction-bundle cache, and Venn-Abers diagnostic-only boundary. The source is the official Federal Reserve public summary extract with five implicates per family; this is an unweighted engineering benchmark, not a population-weighted SCF wealth-distribution estimate. The model frame keeps all 22,975 observed NETWORTH rows, including 1,582 negative and 101 zero net-worth outcomes; holds out whole YY1 family groups so the five implicates for a family cannot cross train/calibration/test; excludes WGT, direct alternate race encodings RACE/RACECL4/RACECL5, loaded balance-sheet target components, and target descendants; and drops RACECL and YY1 from model features. RBF SVR and RBF kernel ridge are intentionally deferred from this first full-frame survey sweep because the 13,785-row grouped training splits make O(n^2) kernel fits a separate subsampling-sensitivity problem rather than a stable full-frame runner task. CV+/jackknife methods are runtime-bounded by configured max-row caps and must not be described as full-data plus/jackknife guarantees. CQR rows use the runner's fixed GradientBoostingRegressor quantile backend and are repeated per outer model configuration, so they are fixed-backend CQR baseline evidence rather than model-family-sensitive CQR evidence. Rankings are exploratory interval-calibration triage only. This is not population-weighted SCF inference, wealth-distribution estimation, individual or household fairness evidence, protected-class fairness evidence, demographic parity evidence, lending/wealth policy guidance, causal evidence, production evidence, final model selection, raw/signed-log robustness evidence, full-imputation pooling evidence, replicate-weight evidence, nonnegative interval validity evidence, or validated Venn-Abers regression evidence."
random_seeds: [11, 23, 47]
alphas: [0.10]
target_transform: signed_log1p
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
  group_col: YY1
conformal:
  cv_plus_folds: 5
  cv_plus_max_train_rows: 5000
  jackknife_plus_max_train_rows: 250
  jackknife_after_bootstrap_n_resamples: 40
  jackknife_after_bootstrap_sample_fraction: 1.0
  jackknife_after_bootstrap_min_oob: 5
  jackknife_after_bootstrap_max_train_rows: 250
  venn_abers_m: 1
datasets:
  - scf_2022_networth
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [0.1, 1.0, 10.0, 100.0, 1000.0]
  - model_id: elasticnet
    family: sparse_linear
    grid:
      alpha: [0.001, 0.01, 0.1]
      l1_ratio: [0.25, 0.75]
  - model_id: bayesian_ridge
    family: linear_bayesian
    grid:
      alpha_1: [0.000001]
      alpha_2: [0.000001]
      lambda_1: [0.000001]
      lambda_2: [0.000001]
  - model_id: knn
    family: instance_based
    grid:
      n_neighbors: [15, 50]
      weights: ["uniform", "distance"]
      p: [2]
  - model_id: random_forest
    family: tree_ensemble
    grid:
      n_estimators: [120]
      max_depth: [8, 16]
      min_samples_leaf: [5, 20]
      max_features: ["sqrt"]
  - model_id: extra_trees
    family: tree_ensemble
    grid:
      n_estimators: [120]
      max_depth: [8, 16]
      min_samples_leaf: [5, 20]
      max_features: ["sqrt"]
  - model_id: hist_gradient_boosting
    family: boosting
    grid:
      learning_rate: [0.03, 0.1]
      max_leaf_nodes: [15, 31]
      l2_regularization: [0.0, 1.0]
  - model_id: xgboost
    family: boosting
    grid:
      n_estimators: [120]
      max_depth: [2, 4]
      learning_rate: [0.03, 0.1]
      subsample: [0.8]
      colsample_bytree: [0.5, 1.0]
  - model_id: lightgbm
    family: boosting
    grid:
      n_estimators: [120]
      num_leaves: [15, 31]
      learning_rate: [0.03, 0.1]
      subsample: [0.8]
      colsample_bytree: [0.5, 1.0]
  - model_id: catboost
    family: boosting
    grid:
      iterations: [120]
      depth: [2, 4]
      learning_rate: [0.03, 0.1]
      l2_leaf_reg: [3.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - split_tail_0.25
  - split_tail_0.50
  - split_tail_0.75
  - cqr
  - cv_plus
  - cv_minmax
  - jackknife_plus
  - jackknife_minmax
  - jackknife_plus_after_bootstrap
  - venn_abers_quantile
  - venn_abers_split_fallback
quality_controls:
  require_atomic_checkpoints: true
  require_prediction_bundle_cache: true
  require_dataset_audit: true
  require_model_params_summary_key: true
  interpret_cqr_as_fixed_quantile_backend: true
  interpret_rankings_as_triage_only: true
  note_seed_aggregate_count: 3
  include_tail_specific_split_variants_for_signed_log1p_endpoint_stress: true
  include_plus_minmax_and_jackknife_after_bootstrap_with_runtime_caps: true
  treat_signed_log1p_as_first_pass_transform_only: true
  require_raw_signed_log_target_sensitivity_followup: true
  require_endpoint_audit_for_signed_inverse_saturation_extreme_tails_and_nonfinite: true
  primary_group_racecl_diagnostic_only: true
  split_group_yy1_family_holdout: true
  not_iid_row_split_evidence: true
  document_five_implicates_per_family_and_grouped_split: true
  document_unweighted_engineering_benchmark_only: true
  document_weight_and_replicate_weight_exclusion: true
  document_full_imputation_pooling_not_integrated: true
  document_negative_zero_positive_target_retention: true
  document_151_column_leakage_exclusion_manifest: true
  document_kernel_methods_deferred_for_large_survey_subsample_sensitivity: true
  cv_plus_runtime_bounded_not_full_data_guarantee: true
  jackknife_runtime_bounded_not_full_data_guarantee: true
  household_survey_proxy_diagnostics_only: true
  forbid_population_weighted_scf_claims: true
  forbid_wealth_distribution_estimation_claims: true
  forbid_individual_or_household_fairness_claims: true
  forbid_protected_class_fairness_claims: true
  forbid_demographic_parity_claims: true
  forbid_policy_guidance_claims: true
  forbid_causal_claims: true
  forbid_production_claims: true
  forbid_final_model_selection_claims: true
  forbid_nonnegative_interval_validity_claims_without_policy: true
  forbid_validated_venn_abers_regression_claims: true
logging:
  ledger: experiments/regression/results/model_family_sweep_scf_2022_networth_signed_log1p_family_split/ledger.jsonl
  checkpoint_root: experiments/regression/results/model_family_sweep_scf_2022_networth_signed_log1p_family_split/checkpoints
  prediction_cache_root: experiments/regression/results/model_family_sweep_scf_2022_networth_signed_log1p_family_split/checkpoints/predictions
