experiment_id: regression_duplicate_cluster_grouped_cv_aif360_lawschool_gpa_row_signature_v0
purpose: "Grouped-CV plus-family follow-up for the row-signature duplicate-cluster AIF360 Law School GPA raw-frame sensitivity run. This preserves the aif360_lawschool_gpa dataset, seeds 11 and 23, baseline model grid, identity-scale zfygpa target modeling, race-primary diagnostic grouping, existing-loader feature policy, train-fitted preprocessing, row-signature duplicate-cluster train/calibration/test allocation, resumable ledger, and prediction-bundle cache. It runs only cv_plus_grouped and cv_minmax_grouped so that the internal CV folds used by plus-family conformal intervals also respect the duplicate-cluster grouping already used by the outer split. This is a method-validity follow-up for the historical ordinary cv_plus duplicate-cluster internal-fold caveat. It does not modify, reinterpret, or overwrite the historical cv_plus rows. It is not publication-ready law-school fairness evidence, legal or admissions-policy guidance, causal or intervention evidence, merit or selection-pipeline evidence, production evidence, final model selection, bounded-support evidence, gender-drop or dual-protected-attribute evidence, or validated Venn-Abers regression evidence."
random_seeds: [11, 23]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
  duplicate_cluster_scope: row_signature
conformal:
  cv_plus_folds: 5
  cv_plus_max_train_rows: 15000
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - aif360_lawschool_gpa
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [0.1, 1.0, 10.0, 100.0]
  - model_id: elasticnet
    family: sparse_linear
    grid:
      alpha: [0.001, 0.01, 0.1]
      l1_ratio: [0.25, 0.75]
  - model_id: bayesian_ridge
    family: linear_bayesian
    grid:
      alpha_1: [0.000001]
      alpha_2: [0.000001]
      lambda_1: [0.000001]
      lambda_2: [0.000001]
  - model_id: svr
    family: kernel
    grid:
      kernel: ["rbf"]
      C: [0.3, 1.0]
      gamma: ["scale", 0.01]
      epsilon: [0.03, 0.1]
  - model_id: knn
    family: instance_based
    grid:
      n_neighbors: [5, 15]
      weights: ["uniform", "distance"]
      p: [2]
  - model_id: random_forest
    family: tree_ensemble
    grid:
      n_estimators: [120]
      max_depth: [null, 8]
      min_samples_leaf: [1, 5]
      max_features: ["sqrt"]
  - model_id: extra_trees
    family: tree_ensemble
    grid:
      n_estimators: [120]
      max_depth: [null, 8]
      min_samples_leaf: [1, 5]
      max_features: ["sqrt"]
  - model_id: hist_gradient_boosting
    family: boosting
    grid:
      learning_rate: [0.03, 0.1]
      max_leaf_nodes: [15, 31]
      l2_regularization: [0.0]
  - model_id: xgboost
    family: boosting
    grid:
      n_estimators: [120]
      max_depth: [2, 4]
      learning_rate: [0.03, 0.1]
      subsample: [0.8]
      colsample_bytree: [0.5]
  - model_id: lightgbm
    family: boosting
    grid:
      n_estimators: [120]
      num_leaves: [15, 31]
      learning_rate: [0.03, 0.1]
      subsample: [0.8]
      colsample_bytree: [0.5]
  - model_id: catboost
    family: boosting
    grid:
      iterations: [120]
      depth: [2, 4]
      learning_rate: [0.03, 0.1]
      l2_leaf_reg: [3.0]
cp_methods:
  - cv_plus_grouped
  - cv_minmax_grouped
quality_controls:
  require_atomic_checkpoints: true
  require_prediction_bundle_cache: true
  require_dataset_audit: true
  require_model_params_summary_key: true
  require_split_groups_train_for_grouped_cv: true
  preserve_duplicate_clusters_in_internal_cv: true
  ordinary_cv_plus_historical_rows_unchanged: true
  interpret_rankings_as_triage_only: true
  note_seed_aggregate_count: 2
  row_signature_duplicate_caveat_followup: true
  duplicate_cluster_scope_is_split_methodology_diagnostic_only: true
  grouped_cv_internal_fold_control: true
  race_primary_protected_group_diagnostic: true
  gender_retained_as_feature_under_existing_loader_policy: true
  require_gender_drop_or_dual_protected_drop_followup: true
  retain_lsat_and_ugpa_as_upstream_selection_pipeline_covariates: true
  omit_exact_kernel_ridge_due_large_n_exact_kernel_solver_risk: true
  forbid_publication_ready_fairness_claims: true
  forbid_legal_or_admissions_policy_claims: true
  forbid_causal_or_intervention_claims: true
  forbid_merit_or_selection_pipeline_claims: true
  forbid_validated_venn_abers_regression_claims: true
  forbid_final_model_selection_claims: true
  forbid_bounded_support_claims: true
  forbid_production_claims: true
logging:
  ledger: experiments/regression/results/duplicate_cluster_grouped_cv_aif360_lawschool_gpa_row_signature/ledger.jsonl
  checkpoint_root: experiments/regression/results/duplicate_cluster_grouped_cv_aif360_lawschool_gpa_row_signature/checkpoints
  prediction_cache_root: experiments/regression/results/duplicate_cluster_grouped_cv_aif360_lawschool_gpa_row_signature/checkpoints/predictions
