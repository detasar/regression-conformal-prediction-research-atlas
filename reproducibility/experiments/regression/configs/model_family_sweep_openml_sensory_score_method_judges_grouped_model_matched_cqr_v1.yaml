experiment_id: regression_model_family_sweep_openml_sensory_score_method_judges_grouped_model_matched_cqr_v1
purpose: Model-matched CQR backend rerun cloned from experiments/regression/configs/model_family_sweep_openml_sensory_score_method_judges_grouped.yaml.
  Historical fixed-GBM CQR rows remain unchanged as comparator evidence; this rerun
  tests whether the CQR backend confounded the original model-family sweep surface.
  The output records backend-sensitivity evidence for this experiment; method
  selection and deployment use would need separate validation studies.
random_seeds:
- 11
- 12
- 47
- 71
- 89
alphas:
- 0.1
target_transform: identity
splits:
  train: 0.5
  calibration: 0.25
  test: 0.25
  group_col: Judges
conformal:
  cv_plus_folds: 5
  cv_plus_max_train_rows: 500
  jackknife_plus_max_train_rows: 500
  jackknife_after_bootstrap_n_resamples: 40
  jackknife_after_bootstrap_sample_fraction: 1.0
  jackknife_after_bootstrap_min_oob: 5
  jackknife_after_bootstrap_max_train_rows: 500
  venn_abers_m: 1
datasets:
- openml_sensory_score
models:
- model_id: ridge
  family: linear
  grid:
    alpha:
    - 0.1
    - 1.0
    - 10.0
    - 100.0
- model_id: elasticnet
  family: sparse_linear
  grid:
    alpha:
    - 0.001
    - 0.01
    - 0.1
    l1_ratio:
    - 0.25
    - 0.75
- model_id: bayesian_ridge
  family: linear_bayesian
  grid:
    alpha_1:
    - 1.0e-06
    alpha_2:
    - 1.0e-06
    lambda_1:
    - 1.0e-06
    lambda_2:
    - 1.0e-06
- model_id: svr
  family: kernel
  grid:
    kernel:
    - rbf
    C:
    - 0.3
    - 1.0
    gamma:
    - scale
    - 0.01
    epsilon:
    - 0.03
    - 0.1
- model_id: kernel_ridge
  family: kernel
  grid:
    kernel:
    - rbf
    alpha:
    - 0.1
    - 1.0
    gamma:
    - 0.001
    - 0.01
- model_id: knn
  family: instance_based
  grid:
    n_neighbors:
    - 5
    - 15
    weights:
    - uniform
    - distance
    p:
    - 2
- model_id: random_forest
  family: tree_ensemble
  grid:
    n_estimators:
    - 120
    max_depth:
    - null
    - 8
    min_samples_leaf:
    - 1
    - 5
    max_features:
    - sqrt
- model_id: extra_trees
  family: tree_ensemble
  grid:
    n_estimators:
    - 120
    max_depth:
    - null
    - 8
    min_samples_leaf:
    - 1
    - 5
    max_features:
    - sqrt
- model_id: hist_gradient_boosting
  family: boosting
  grid:
    learning_rate:
    - 0.03
    - 0.1
    max_leaf_nodes:
    - 15
    - 31
    l2_regularization:
    - 0.0
- model_id: xgboost
  family: boosting
  grid:
    n_estimators:
    - 120
    max_depth:
    - 2
    - 4
    learning_rate:
    - 0.03
    - 0.1
    subsample:
    - 0.8
    colsample_bytree:
    - 0.5
- model_id: lightgbm
  family: boosting
  grid:
    n_estimators:
    - 120
    num_leaves:
    - 15
    - 31
    learning_rate:
    - 0.03
    - 0.1
    subsample:
    - 0.8
    colsample_bytree:
    - 0.5
- model_id: catboost
  family: boosting
  grid:
    iterations:
    - 120
    depth:
    - 2
    - 4
    learning_rate:
    - 0.03
    - 0.1
    l2_leaf_reg:
    - 3.0
cp_methods:
- split_abs
- mondrian_abs
- normalized_abs
- split_tail_0.25
- split_tail_0.50
- split_tail_0.75
- cqr_model_matched
- cv_plus
- cv_minmax
- jackknife_plus
- jackknife_minmax
- jackknife_plus_after_bootstrap
- venn_abers_quantile
- venn_abers_split_fallback
quality_controls:
  require_atomic_checkpoints: true
  require_prediction_bundle_cache: true
  require_dataset_audit: true
  require_model_params_summary_key: true
  interpret_rankings_as_triage_only: true
  note_seed_aggregate_count: 5
  preserve_judges_grouped_split: true
  require_unique_judge_allocations_across_seeds: true
  one_calibration_judge_two_test_judges_caveat: true
  method_primary_design_factor_diagnostic_only: true
  exclude_method_and_judges_from_features: true
  include_tail_specific_split_variants_for_endpoint_stress: true
  include_plus_minmax_and_jackknife_after_bootstrap_for_small_repeated_design: true
  identity_scale_bounded_discrete_score_target: true
  require_endpoint_audit_for_lower_below_12_5_and_upper_above_17_5: true
  require_bounded_or_ordinal_interval_policy_followup: true
  require_leave_one_judge_or_random_effect_sensitivity_followup: true
  require_method_as_feature_sensitivity_followup: true
  require_factor_design_leakage_review_followup: true
  forbid_protected_class_group_inference_claims: true
  forbid_demographic_parity_claims: true
  forbid_sensory_science_inference_claims: true
  forbid_wine_quality_inference_claims: true
  forbid_product_ranking_claims: true
  forbid_causal_claims: true
  forbid_external_validity_claims: true
  forbid_production_claims: true
  forbid_final_model_selection_claims: true
  forbid_bounded_interval_validity_claims_without_clipping_policy: true
  forbid_validated_venn_abers_regression_claims: true
  interpret_cqr_as_model_matched_quantile_backend: true
  historical_fixed_gbm_cqr_preserved_as_comparator: true
  requires_cqr_fixed_vs_model_matched_synthesis: true
  no_method_selection_claim: true
logging:
  ledger: experiments/regression/results/model_family_sweep_openml_sensory_score_method_judges_grouped_model_matched_cqr_v1/ledger.jsonl
  checkpoint_root: experiments/regression/results/model_family_sweep_openml_sensory_score_method_judges_grouped_model_matched_cqr_v1/checkpoints
  prediction_cache_root: experiments/regression/results/model_family_sweep_openml_sensory_score_method_judges_grouped_model_matched_cqr_v1/checkpoints/predictions
cp_method_configs:
  cqr_model_matched:
    method_id: cqr_model_matched
    params:
      quantile_regressor_alpha: 0.0001
      quantile_solver: highs
      nystroem_components: 200
rerun_metadata:
  schema: cpfi_regression_model_matched_cqr_rerun_config_v1
  source_config: experiments/regression/configs/model_family_sweep_openml_sensory_score_method_judges_grouped.yaml
