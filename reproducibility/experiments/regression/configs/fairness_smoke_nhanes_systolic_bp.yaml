experiment_id: regression_fairness_smoke_nhanes_systolic_bp_unweighted_v0
purpose: "Smoke-test audited NHANES 2017-2018 mean systolic blood pressure regression with race/ethnicity diagnostics. This is an unweighted engineering smoke, not a population-weighted NHANES health estimate or clinical fairness conclusion."
random_seeds: [11, 23, 47]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - nhanes_2017_2018_systolic_bp
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_nhanes_systolic_bp/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_nhanes_systolic_bp/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_nhanes_systolic_bp/checkpoints/predictions
