experiment_id: regression_model_family_sweep_hmda_2025_wy_interest_rate_identity_lei_split_model_matched_cqr_v1
purpose: Model-matched CQR backend rerun cloned from experiments/regression/configs/model_family_sweep_hmda_2025_wy_interest_rate_identity_lei_split.yaml.
  Historical fixed-GBM CQR rows remain unchanged as comparator evidence; this rerun
  tests whether the CQR backend confounded the original model-family sweep surface.
  The output is descriptive pipeline-level evidence only and does not authorize a
  method winner or production recommendation.
random_seeds:
- 11
- 23
- 47
alphas:
- 0.1
target_transform: identity
splits:
  train: 0.6
  calibration: 0.2
  test: 0.2
  group_col: lei
conformal:
  cv_plus_folds: 5
  cv_plus_max_train_rows: 8000
  jackknife_plus_max_train_rows: 250
  jackknife_after_bootstrap_n_resamples: 40
  jackknife_after_bootstrap_sample_fraction: 1.0
  jackknife_after_bootstrap_min_oob: 5
  jackknife_after_bootstrap_max_train_rows: 250
  venn_abers_m: 1
datasets:
- hmda_2025_wy_interest_rate
models:
- model_id: ridge
  family: linear
  grid:
    alpha:
    - 0.1
    - 1.0
    - 10.0
    - 100.0
    - 1000.0
- model_id: elasticnet
  family: sparse_linear
  grid:
    alpha:
    - 0.001
    - 0.01
    - 0.1
    l1_ratio:
    - 0.25
    - 0.75
- model_id: bayesian_ridge
  family: linear_bayesian
  grid:
    alpha_1:
    - 1.0e-06
    alpha_2:
    - 1.0e-06
    lambda_1:
    - 1.0e-06
    lambda_2:
    - 1.0e-06
- model_id: knn
  family: instance_based
  grid:
    n_neighbors:
    - 15
    - 50
    weights:
    - uniform
    - distance
    p:
    - 2
- model_id: random_forest
  family: tree_ensemble
  grid:
    n_estimators:
    - 120
    max_depth:
    - 8
    - 16
    min_samples_leaf:
    - 5
    - 20
    max_features:
    - sqrt
- model_id: extra_trees
  family: tree_ensemble
  grid:
    n_estimators:
    - 120
    max_depth:
    - 8
    - 16
    min_samples_leaf:
    - 5
    - 20
    max_features:
    - sqrt
- model_id: hist_gradient_boosting
  family: boosting
  grid:
    learning_rate:
    - 0.03
    - 0.1
    max_leaf_nodes:
    - 15
    - 31
    l2_regularization:
    - 0.0
    - 1.0
- model_id: xgboost
  family: boosting
  grid:
    n_estimators:
    - 120
    max_depth:
    - 2
    - 4
    learning_rate:
    - 0.03
    - 0.1
    subsample:
    - 0.8
    colsample_bytree:
    - 0.5
    - 1.0
- model_id: lightgbm
  family: boosting
  grid:
    n_estimators:
    - 120
    num_leaves:
    - 15
    - 31
    learning_rate:
    - 0.03
    - 0.1
    subsample:
    - 0.8
    colsample_bytree:
    - 0.5
    - 1.0
- model_id: catboost
  family: boosting
  grid:
    iterations:
    - 120
    depth:
    - 2
    - 4
    learning_rate:
    - 0.03
    - 0.1
    l2_leaf_reg:
    - 3.0
cp_methods:
- split_abs
- mondrian_abs
- normalized_abs
- split_tail_0.25
- split_tail_0.50
- split_tail_0.75
- cqr_model_matched
- cv_plus
- cv_minmax
- jackknife_plus
- jackknife_minmax
- jackknife_plus_after_bootstrap
- venn_abers_quantile
- venn_abers_split_fallback
quality_controls:
  require_atomic_checkpoints: true
  require_prediction_bundle_cache: true
  require_dataset_audit: true
  require_model_params_summary_key: true
  interpret_rankings_as_triage_only: true
  note_seed_aggregate_count: 3
  include_tail_specific_split_variants_for_raw_scale_endpoint_stress: true
  include_cv_plus_and_cv_minmax_when_train_cap_permits: true
  include_jackknife_family_with_runtime_caps: true
  treat_identity_target_as_first_pass_only: true
  require_rate_spread_and_pricing_cooutcome_policy_documentation: true
  require_exempt_and_nonpositive_target_policy_documentation: true
  require_endpoint_audit_for_lower_below_zero_upper_outliers_nonfinite_crossing_and_nonnegative_support: true
  primary_group_derived_race_diagnostic_only: true
  split_group_lei_lender_holdout: true
  not_iid_row_split_evidence: true
  document_official_ffiec_cfpb_hmda_2025_public_lar_source: true
  document_single_state_wyoming_engineering_benchmark_only: true
  document_originated_loans_actions_taken_1_universe: true
  document_positive_numeric_interest_rate_target_filter: true
  document_lei_grouped_split_zero_overlap_per_seed: true
  document_unequal_lender_group_row_counts: true
