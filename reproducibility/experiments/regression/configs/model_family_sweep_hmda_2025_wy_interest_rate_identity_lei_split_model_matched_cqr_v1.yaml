  no_method_winner_claim: true
logging:
  ledger: experiments/regression/results/model_family_sweep_hmda_2025_wy_interest_rate_identity_lei_split_model_matched_cqr_v1/ledger.jsonl
  checkpoint_root: experiments/regression/results/model_family_sweep_hmda_2025_wy_interest_rate_identity_lei_split_model_matched_cqr_v1/checkpoints
  prediction_cache_root: experiments/regression/results/model_family_sweep_hmda_2025_wy_interest_rate_identity_lei_split_model_matched_cqr_v1/checkpoints/predictions
