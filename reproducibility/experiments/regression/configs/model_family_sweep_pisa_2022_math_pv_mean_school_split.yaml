experiment_id: regression_model_family_sweep_pisa_2022_math_pv_mean_school_split_v0
purpose: "Controlled model-family, hyperparameter, and conformal-variant sweep for the policy-gated OECD PISA 2022 mathematics plausible-value-mean benchmark. This extends the completed ridge benchmark smoke to regularized linear, Bayesian linear, kernel, instance-based, tree-ensemble, histogram boosting, and installed gradient-boosting libraries while preserving ST004D01T as the primary diagnostic group, CNTSCHID school-grouped splitting, identity target modeling for MATH_PV_MEAN, train-fitted preprocessing, resumable ledger, prediction-bundle cache, and Venn-Abers diagnostic-only boundary. The runner frame is a deterministic 6000-row country-balanced benchmark sample with up to 75 students per CNT country/economy from the official OECD PISA 2022 student questionnaire SAS source. MATH_PV_MEAN is the row-wise mean of PV1MATH-PV10MATH and is used only for conformal-regression method prototyping; publication-grade PISA analysis must run across plausible values and combine estimates according to PISA methodology. Raw plausible-value target components and reading/science co-outcomes are excluded by the PISA audit model frame; W_FSTUWT and W_FSTURWT1-W_FSTURWT80 are excluded from unweighted benchmark features and metrics. CNTSCHID is used only as the grouped split key and is dropped from model features together with the target and ST004D01T. Country/economy columns remain model-visible as benchmark predictors, so this is not country inference or school inference. CV+/CV-minmax methods run only under the configured max-row cap; jackknife methods are runtime-bounded by configured caps and must not be described as full-data plus/jackknife guarantees if skipped. CQR rows use the runner's fixed GradientBoostingRegressor quantile backend and are repeated per outer model configuration, so they are fixed-backend CQR baseline evidence rather than model-family-sensitive CQR evidence. Rankings are exploratory interval-calibration triage only. This is not PISA/OECD education inference, country ranking, school-effectiveness evidence, policy guidance, causal evidence, population-weighted evidence, plausible-value pooled evidence, student-level fairness evidence, protected-class fairness evidence, demographic parity evidence, production evidence, final model selection, bounded-score validity evidence, or validated Venn-Abers regression evidence."
random_seeds: [11, 23, 47]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
  group_col: CNTSCHID
conformal:
  cv_plus_folds: 5
  cv_plus_max_train_rows: 4000
  jackknife_plus_max_train_rows: 250
  jackknife_after_bootstrap_n_resamples: 40
  jackknife_after_bootstrap_sample_fraction: 1.0
  jackknife_after_bootstrap_min_oob: 5
  jackknife_after_bootstrap_max_train_rows: 250
  venn_abers_m: 1
datasets:
  - pisa_2022_math_pv_mean
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [0.1, 1.0, 10.0, 100.0]
  - model_id: elasticnet
    family: sparse_linear
    grid:
      alpha: [0.001, 0.01, 0.1]
      l1_ratio: [0.25, 0.75]
  - model_id: bayesian_ridge
    family: linear_bayesian
    grid:
      alpha_1: [0.000001]
      alpha_2: [0.000001]
      lambda_1: [0.000001]
      lambda_2: [0.000001]
  - model_id: svr
    family: kernel
    grid:
      kernel: ["rbf"]
      C: [0.3, 1.0]
      gamma: ["scale", 0.01]
      epsilon: [0.03, 0.1]
  - model_id: kernel_ridge
    family: kernel
    grid:
      kernel: ["rbf"]
      alpha: [0.1, 1.0]
      gamma: [0.001, 0.01]
  - model_id: knn
    family: instance_based
    grid:
      n_neighbors: [5, 15]
      weights: ["uniform", "distance"]
      p: [2]
  - model_id: random_forest
    family: tree_ensemble
    grid:
      n_estimators: [120]
      max_depth: [null, 8]
      min_samples_leaf: [1, 5]
      max_features: ["sqrt"]
  - model_id: extra_trees
    family: tree_ensemble
    grid:
      n_estimators: [120]
      max_depth: [null, 8]
      min_samples_leaf: [1, 5]
      max_features: ["sqrt"]
  - model_id: hist_gradient_boosting
    family: boosting
    grid:
      learning_rate: [0.03, 0.1]
      max_leaf_nodes: [15, 31]
      l2_regularization: [0.0]
  - model_id: xgboost
    family: boosting
    grid:
      n_estimators: [120]
      max_depth: [2, 4]
      learning_rate: [0.03, 0.1]
      subsample: [0.8]
      colsample_bytree: [0.5]
  - model_id: lightgbm
    family: boosting
    grid:
      n_estimators: [120]
      num_leaves: [15, 31]
      learning_rate: [0.03, 0.1]
      subsample: [0.8]
      colsample_bytree: [0.5]
  - model_id: catboost
    family: boosting
    grid:
      iterations: [120]
      depth: [2, 4]
      learning_rate: [0.03, 0.1]
      l2_leaf_reg: [3.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - split_tail_0.25
  - split_tail_0.50
  - split_tail_0.75
  - cqr
  - cv_plus
  - cv_minmax
  - jackknife_plus
  - jackknife_minmax
  - jackknife_plus_after_bootstrap
  - venn_abers_quantile
  - venn_abers_split_fallback
quality_controls:
  require_atomic_checkpoints: true
  require_prediction_bundle_cache: true
  require_dataset_audit: true
  require_model_params_summary_key: true
  interpret_cqr_as_fixed_quantile_backend: true
  interpret_rankings_as_triage_only: true
  note_seed_aggregate_count: 3
  include_tail_specific_split_variants_for_identity_endpoint_stress: true
  include_plus_minmax_and_jackknife_after_bootstrap_with_runtime_caps: true
  treat_math_pv_mean_as_method_prototyping_target_only: true
  require_plausible_value_pooling_followup_for_pisa_inference: true
  require_endpoint_audit_for_score_scale_outliers_nonfinite_crossing_and_saturation: true
  primary_group_st004d01t_diagnostic_only: true
  split_group_cntschid_school_holdout: true
  not_iid_row_split_evidence: true
  document_country_balanced_6000_row_benchmark_sample: true
  document_school_grouped_split_zero_overlap_per_seed: true
  document_raw_plausible_values_excluded_from_features: true
  document_weight_and_replicate_weight_exclusion: true
  document_country_columns_model_visible_benchmark_predictors: true
  document_unweighted_benchmark_only: true
  cv_plus_runtime_bounded_not_full_data_guarantee: true
  jackknife_runtime_bounded_not_full_data_guarantee: true
  student_demographic_proxy_diagnostics_only: true
  forbid_pisa_oecd_education_inference_claims: true
  forbid_country_ranking_claims: true
  forbid_school_effectiveness_claims: true
  forbid_population_weighted_claims: true
  forbid_plausible_value_pooled_claims: true
  forbid_student_level_fairness_claims: true
  forbid_protected_class_fairness_claims: true
  forbid_demographic_parity_claims: true
  forbid_policy_guidance_claims: true
  forbid_causal_claims: true
  forbid_production_claims: true
  forbid_final_model_selection_claims: true
  forbid_bounded_score_validity_claims_without_policy: true
  forbid_validated_venn_abers_regression_claims: true
logging:
  ledger: experiments/regression/results/model_family_sweep_pisa_2022_math_pv_mean_school_split/ledger.jsonl
  checkpoint_root: experiments/regression/results/model_family_sweep_pisa_2022_math_pv_mean_school_split/checkpoints
  prediction_cache_root: experiments/regression/results/model_family_sweep_pisa_2022_math_pv_mean_school_split/checkpoints/predictions
