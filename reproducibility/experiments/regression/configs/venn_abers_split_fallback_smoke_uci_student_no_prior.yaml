experiment_id: regression_venn_abers_split_fallback_smoke_uci_student_no_prior_v0
purpose: "Runner-level smoke for venn_abers_split_fallback on UCI Student Performance without G1/G2 prior-grade predictors. This is a method-plumbing and calibration-envelope diagnostic, not a student-performance fairness conclusion."
random_seeds: [11, 23, 47]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - uci_student_performance_no_prior_grades
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - normalized_abs
  - cqr
  - venn_abers_quantile
  - venn_abers_split_fallback
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/venn_abers_split_fallback_smoke_uci_student_no_prior/ledger.jsonl
  checkpoint_root: experiments/regression/results/venn_abers_split_fallback_smoke_uci_student_no_prior/checkpoints
  prediction_cache_root: experiments/regression/results/venn_abers_split_fallback_smoke_uci_student_no_prior/checkpoints/predictions
