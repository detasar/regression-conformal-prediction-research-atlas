experiment_id: regression_fairness_smoke_openml_hiroshima_rate_dose_duplicate_sensitivity_v0
purpose: "Policy-gated OpenML AnalCatData Hiroshima aberrant-cell rate smoke with fixed dose-band diagnostics and raw-vs-exact-deduplicated sensitivity. The source has a constant Total_cells denominator of 100 and an 81.5% exact duplicate row rate, so this is a radiation-biology benchmark diagnostic only, not clinical/radiobiology inference or validated Venn-Abers regression evidence."
random_seeds: [11, 23, 47, 71, 89]
alphas: [0.10]
target_transform: log1p
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - openml_analcatdata_hiroshima_rate
  - openml_analcatdata_hiroshima_rate_dedup
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_openml_hiroshima_rate_dose_duplicate_sensitivity/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_openml_hiroshima_rate_dose_duplicate_sensitivity/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_openml_hiroshima_rate_dose_duplicate_sensitivity/checkpoints/predictions
