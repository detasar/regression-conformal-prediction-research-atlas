experiment_id: regression_fairness_smoke_college_scorecard_2026_earnings_log1p_state_split_v0
purpose: "Smoke-test audited College Scorecard 2026 institution median-earnings regression with institution-control diagnostics and state-grouped splits. This is an institution-level proxy diagnostic, not an individual earnings fairness conclusion."
random_seeds: [11, 23, 47]
alphas: [0.10]
target_transform: log1p
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
  group_col: STABBR
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - college_scorecard_2026_median_earnings
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_college_scorecard_earnings_log1p_state_split/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_college_scorecard_earnings_log1p_state_split/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_college_scorecard_earnings_log1p_state_split/checkpoints/predictions
