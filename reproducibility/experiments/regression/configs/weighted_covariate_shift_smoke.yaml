experiment_id: regression_weighted_covariate_shift_smoke_v0
purpose: "Smoke-test estimated density-ratio weighted split conformal against ordinary split conformal on audited Auto MPG."
random_seeds: [42]
alphas: [0.10]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  covariate_shift_probability_clip: 0.01
  covariate_shift_weight_clip: 10.0
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  jackknife_after_bootstrap_n_resamples: 40
  jackknife_after_bootstrap_sample_fraction: 1.0
  jackknife_after_bootstrap_min_oob: 5
  jackknife_after_bootstrap_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - uci_auto_mpg
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - weighted_abs_covariate_shift
logging:
  ledger: experiments/regression/results/weighted_covariate_shift_smoke/ledger.jsonl
  checkpoint_root: experiments/regression/results/weighted_covariate_shift_smoke/checkpoints
  prediction_cache_root: experiments/regression/results/weighted_covariate_shift_smoke/checkpoints/predictions
