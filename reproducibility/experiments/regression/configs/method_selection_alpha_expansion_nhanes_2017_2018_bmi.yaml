  source_config: experiments/regression/configs/duplicate_cluster_sensitivity_nhanes_2017_2018_bmi_identity_ridreth3_model_visible.yaml
  source_experiment_id: regression_duplicate_cluster_sensitivity_nhanes_2017_2018_bmi_identity_ridreth3_model_visible_v0
  dataset_alpha_task_ids:
  - method_selection_alpha_expansion::nhanes_2017_2018_bmi::alpha_0_01
  - method_selection_alpha_expansion::nhanes_2017_2018_bmi::alpha_0_05
  - method_selection_alpha_expansion::nhanes_2017_2018_bmi::alpha_0_15
