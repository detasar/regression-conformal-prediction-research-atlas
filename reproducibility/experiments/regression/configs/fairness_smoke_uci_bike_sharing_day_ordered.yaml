experiment_id: regression_fairness_smoke_uci_bike_sharing_day_ordered_v0
purpose: "Three-seed UCI Bike Sharing hourly demand engineering smoke with day-ordered train/calibration/test splits. This uses season as an operational diagnostic group, models cnt on log1p scale, drops target descendants casual and registered when present, keeps dteday only for split ordering, and is not protected-class fairness evidence."
random_seeds: [11, 23, 47]
alphas: [0.10]
target_transform: log1p
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
  strategy: ordered
  group_col: dteday
  order_col: dteday
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - uci_bike_sharing
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - normalized_abs
  - cqr
  - cv_plus
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/fairness_smoke_uci_bike_sharing_day_ordered/ledger.jsonl
  checkpoint_root: experiments/regression/results/fairness_smoke_uci_bike_sharing_day_ordered/checkpoints
  prediction_cache_root: experiments/regression/results/fairness_smoke_uci_bike_sharing_day_ordered/checkpoints/predictions
