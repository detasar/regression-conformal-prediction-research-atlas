experiment_id: regression_pilot_v0
purpose: "Validate resumable regression conformal pipeline on small manually audited datasets."
random_seeds: [42, 123, 456]
alphas: [0.05, 0.10, 0.20]
target_transform: identity
splits:
  train: 0.60
  calibration: 0.20
  test: 0.20
conformal:
  cv_plus_folds: 5
  jackknife_plus_max_train_rows: 500
  venn_abers_m: 1
datasets:
  - uci_student_performance
  - uci_auto_mpg
models:
  - model_id: ridge
    family: linear
    grid:
      alpha: [0.01, 0.1, 1.0, 10.0, 100.0]
  - model_id: random_forest
    family: tree_ensemble
    grid:
      n_estimators: [300, 800]
      max_depth: [null, 8, 16]
      min_samples_leaf: [1, 5, 20]
  - model_id: hist_gradient_boosting
    family: boosting
    grid:
      learning_rate: [0.03, 0.06, 0.1]
      max_leaf_nodes: [15, 31, 63]
      l2_regularization: [0.0, 0.1, 1.0]
cp_methods:
  - split_abs
  - mondrian_abs
  - shrink_0.00
  - shrink_0.25
  - shrink_0.50
  - shrink_0.75
  - shrink_1.00
  - normalized_abs
  - cqr
  - venn_abers_quantile
quality_controls:
  interpret_cqr_as_fixed_quantile_backend: true
  forbid_validated_venn_abers_regression_claims: true

logging:
  ledger: experiments/regression/results/ledger.jsonl
  checkpoint_root: experiments/regression/results/checkpoints
  prediction_cache_root: experiments/regression/results/checkpoints/predictions
