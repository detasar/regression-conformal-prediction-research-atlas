name: public-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  public-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify release checksums
        run: sha256sum -c CHECKSUMS.sha256
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install public package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run public artifact smoke tests
        run: python -m pytest -m "unit or artifact_public or smoke"
      - name: Verify root command
        run: |
          python -m experiments.regression.scripts.run_regression_pilot --help
          python -m experiments.regression.scripts.run_regression_pilot --max-runs 0
          python -m experiments.regression.scripts.run_benchmark_v2_chunk --chunk-id benchmark_v2_chunk_0001 --package-root . --dry-run
