name: public-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  public-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify release checksums
        run: sha256sum -c CHECKSUMS.sha256
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install public package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run package and rebuild smoke checks
        run: >
          python -m pytest -m "unit or artifact_public or smoke" -q
          -k "core_imports or package_data or wheel_contains or root_command or rebuild_commands"
      - name: Run artifact schema and link checks
        run: >
          python -m pytest -m "unit or artifact_public or smoke" -q
          -k "kg_and_artifact_manifest or scope_catalogs or source_metadata or benchmark_v2 or audit_response or maintenance_quality or schema_registry or result_cube_schema or results_page or provenance_page or accounting_matrix or html_links"
      - name: Run reader SEO and accessibility checks
        run: >
          python -m pytest -m "unit or artifact_public or smoke" -q
          -k "reader_surfaces or html_metadata or seo_and_citation or pdfs_include or pipeline_level or selection_language or public_source_references or literature_citations or diagnostic_bands or repository_text"
      - name: Run full public artifact smoke suite
        run: python -m pytest -m "unit or artifact_public or smoke" -q
      - name: Verify root command
        run: |
          python -m experiments.regression.scripts.run_regression_pilot --help
          python -m experiments.regression.scripts.run_regression_pilot --max-runs 0
          python -m experiments.regression.scripts.run_benchmark_v2_chunk --chunk-id benchmark_v2_chunk_0001 --package-root . --dry-run
